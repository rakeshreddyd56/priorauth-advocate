<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="Charter, 'Iowan Old Style', Georgia, serif">
  <rect width="1600" height="900" fill="#FAF8F3"/>

  <text x="120" y="120" font-size="22" font-family="Inter, sans-serif" fill="#4A4F4B" letter-spacing="4">IMPACT MATH</text>
  <text x="120" y="200" font-size="60" fill="#1F2421" font-weight="500">If we close even a fraction of the gap.</text>

  <!-- big number -->
  <g transform="translate(120,340)">
    <text x="0" y="240" font-size="280" fill="#1F4D2E" font-weight="500" letter-spacing="-6">320K</text>
    <text x="540" y="120" font-size="60" fill="#4A4F4B">/ year</text>
  </g>

  <!-- descr right column -->
  <g transform="translate(900,380)">
    <text x="0" y="0" font-size="34" fill="#1F2421" font-weight="500">reversed Medicare</text>
    <text x="0" y="44" font-size="34" fill="#1F2421" font-weight="500">Advantage denials,</text>
    <text x="0" y="88" font-size="34" fill="#1F2421" font-weight="500">at a 10% patient</text>
    <text x="0" y="132" font-size="34" fill="#1F2421" font-weight="500">appeal rate and current</text>
    <text x="0" y="176" font-size="34" fill="#1F2421" font-weight="500">overturn odds.</text>
    <text x="0" y="260" font-size="34" fill="#1F4D2E" font-weight="600">$640M–$1.6B</text>
    <text x="0" y="304" font-size="28" fill="#1F2421" font-weight="500">in care delivered to patients</text>
    <text x="0" y="338" font-size="28" fill="#1F2421" font-weight="500">who would have given up.</text>
  </g>

  <!-- math footer -->
  <text x="120" y="820" font-size="17" font-family="'SF Mono', Menlo, monospace" fill="#4A4F4B">4.1M MA denials/yr (KFF Feb 2026)  ×  10% appeal rate  ×  80% overturn rate  ≈  320,000 reversals  ×  $2K–$5K/claim</text>

  <line x1="120" y1="858" x2="1480" y2="858" stroke="#1F2421" stroke-width="1"/>
  <text x="120" y="880" font-size="14" font-family="Inter, sans-serif" fill="#4A4F4B" letter-spacing="3">11 / 12</text>
  <text x="1480" y="880" font-size="14" font-family="Inter, sans-serif" fill="#4A4F4B" letter-spacing="3" text-anchor="end">IMPACT</text>
</svg>
