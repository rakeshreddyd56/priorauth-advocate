<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="Charter, 'Iowan Old Style', Georgia, serif">
  <rect width="1600" height="900" fill="#FAF8F3"/>

  <!-- top label -->
  <text x="120" y="120" font-size="22" font-family="Inter, sans-serif" fill="#4A4F4B" letter-spacing="4" text-transform="uppercase">THE ASYMMETRY</text>

  <!-- headline -->
  <text x="120" y="200" font-size="84" fill="#1F2421" font-weight="500">The gap is paperwork.</text>

  <!-- chart group -->
  <g transform="translate(120,320)">
    <!-- row 1 — Denials appealed (tiny bar) -->
    <text x="0" y="40" font-size="36" fill="#1F2421" font-weight="500">Denials appealed</text>
    <text x="0" y="72" font-size="18" font-family="Inter, sans-serif" fill="#4A4F4B">of every 100 denied claims</text>
    <rect x="380" y="10" width="11" height="80" fill="#1F4D2E"/>
    <text x="1290" y="60" font-size="64" fill="#1F2421" text-anchor="end">&lt; 1%</text>

    <!-- row 2 — Appeals that win (big bar) -->
    <text x="0" y="200" font-size="36" fill="#1F2421" font-weight="500">Appeals that win</text>
    <text x="0" y="232" font-size="18" font-family="Inter, sans-serif" fill="#4A4F4B">Medicare Advantage, overturned partially or fully</text>
    <rect x="380" y="170" width="902" height="80" fill="#1F4D2E"/>
    <text x="1290" y="220" font-size="64" fill="#1F2421" text-anchor="end">82%</text>

    <!-- dashed gap arrow -->
    <line x1="380" y1="310" x2="380" y2="370" stroke="#4A4F4B" stroke-width="2" stroke-dasharray="6,6"/>
    <text x="400" y="360" font-size="26" font-style="italic" fill="#1F2421">This is where we live.</text>
  </g>

  <!-- footnote -->
  <text x="120" y="830" font-size="16" font-family="Inter, sans-serif" fill="#4A4F4B">KFF analysis of CMS Medicare Advantage data, February 2026. AMA 2024 Prior Authorization Physician Survey.</text>

  <!-- footer rule -->
  <line x1="120" y1="858" x2="1480" y2="858" stroke="#1F2421" stroke-width="1"/>
  <text x="120" y="880" font-size="14" font-family="Inter, sans-serif" fill="#4A4F4B" letter-spacing="3">06 / 12</text>
  <text x="1480" y="880" font-size="14" font-family="Inter, sans-serif" fill="#4A4F4B" letter-spacing="3" text-anchor="end">THE ASYMMETRY</text>
</svg>
